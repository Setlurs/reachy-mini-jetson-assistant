# Reachy Mini Jetson Assistant — Configuration

llm:
  # Ollama exposes both its native /api/chat and an OpenAI-compatible
  # /v1/chat/completions. Use backend: "openai" against the bare
  # http://localhost:11434 base_url (the client appends /v1/... paths
  # itself); this is the only path that accepts OpenAI-style image_url
  # content for vision chat. Native Ollama /api/chat needs a separate
  # `images:` field which our llm.py does not produce.
  backend: "openai"
  base_url: "http://localhost:11434"
  model: "gemma4:e2b"
  #model: ""                           # empty = auto-detect from server
  #base_url: "http://localhost:8080"
  #backend: "openai"                   # "openai" (llama.cpp) or "ollama"
  max_tokens: 32000
  temperature: 0.7
  timeout: 120.0
  # Tool calling — when true, the LLM can invoke registered tools.
  # Requires a tool-capable model (gemma3, qwen2.5, llama3.1+, etc.).
  # enabled_tools is an explicit allowlist; leaving it empty enables all
  # registered tools.
  tools_enabled: true
  enabled_tools:
    - do_nothing
    - move_head
    - play_emotion
    - stop_emotion
    - analyze_image
    - web_search
    - air_quality
    - water_data
    - wildfire_activity
  system_prompt: |
    You are Reachy Mini, a robot running on a Jetson Orin Nano.
    Your responses will be spoken aloud via text-to-speech.
    Answer in one sentence when possible, two max. Be direct.
    Only answer what was asked. Do not volunteer extra details.
    If the provided context does not contain the answer, say "Sorry, I don't know the answer to that."
    Never use emojis, asterisks, bullet points, markdown, code blocks, or special formatting.
    Write numbers and units as spoken words when short.
    Do not include terminal commands unless specifically asked.
  system_prompt_no_rag: |
    You are Reachy Mini, a robot running on a Jetson Orin Nano.
    Your responses will be spoken aloud via text-to-speech.
    Answer in one to two sentences. Be direct and concise.
    Answer from your own knowledge.
    Never use emojis, asterisks, bullet points, markdown, code blocks, or special formatting.
    Write numbers and units as spoken words when short.

stt:
  model: "small.en"                   # tiny.en, base.en, small.en
  device: "cuda"
  compute_type: "int8"
  language: "en"
  beam_size: 1                        # 1=greedy (fast), 5=beam (quality)

tts:
  voice: "af_sarah"                   # kokoro voices: af_sarah, af_bella, am_adam, bf_emma, bm_george, etc.
  speed: 1.0
  lang: "en-us"                       # kokoro language code
  # Streaming chunker: waterfall splitter buffers tokens and emits chunks
  # on natural breaks (sentence > clause > phrase > space). first_chunk
  # is smaller for fast time-to-first-audio; later chunks aim for full
  # sentences so prosody stays natural.
  first_chunk_chars: 60
  max_chunk_chars: 150
  # Legacy word-count thresholds (kept for backwards compat; the chunker
  # uses the _chars values above).
  first_chunk_words: 3
  max_chunk_words: 8

audio:
  sample_rate: 16000
  channels: 2
  input_device: "Reachy Mini Audio"

vad:
  use_silero: true                    # true = Silero neural VAD (much better), false = energy-only
  silero_threshold: 0.75              # speech probability threshold for Silero (raise to reject more noise)
  speech_threshold: 0.025             # RMS threshold (pre-filter when Silero is on, sole gate when off)
  silence_duration_ms: 600            # ms of silence to end an utterance
  lookback_ms: 250                    # ms of audio to prepend before speech onset
  max_speech_secs: 15                 # max single utterance length
  chunk_ms: 32                        # audio chunk size (32ms required for Silero, 30ms for energy-only)
  min_utterance_secs: 0.8             # reject utterances shorter than this (filters coughs/bumps)
  min_utterance_rms: 0.025            # reject utterances quieter than this (filters background chatter)

vision:
  camera_device: 1                    # /dev/video1
  width: 640
  height: 480
  jpeg_quality: 80                    # JPEG compression (lower = smaller payload)
  frames: 1                           # max frames to send per utterance
  capture_fps: 3.0                    # background capture rate (frames/sec)
  system_prompt: |
    You are Reachy Mini, a friendly robot made by Pollen Robotics, running on an NVIDIA Jetson Orin Nano.
    You use the Cosmos Reason2 vision-language model for understanding what you see.
    Answer in one short sentence. No markdown or formatting.
  few_shot:
    - role: "user"
      content: "Hi!"
    - role: "assistant"
      content: "Hello!"
    - role: "user"
      content: "Thank you so much."
    - role: "assistant"
      content: "You're welcome!"
    - role: "user"
      content: "Okay, bye!"
    - role: "assistant"
      content: "Goodbye, see you later!"

emotion:
  enabled: true                       # enable sentiment-based emotion detection + reactive movements

reachy:
  enabled: true                       # set false to skip robot connection entirely
  # Defaults target the Reachy Mini Wireless (CM4) with the reachy-mini-daemon
  # (1.7.0) already running on the robot. The app runs on a separate host
  # (Mac or Jetson) and connects over WebRTC, so it does NOT spawn a daemon
  # and does NOT use a local USB camera/audio device.
  #   wired Reachy Mini Lite users: set wireless: false, spawn_daemon: true,
  #   media_backend: "no_media".
  #   running the app on the CM4 itself: set on_device: true (uses GStreamer).
  wireless: true
  on_device: false
  spawn_daemon: false
  timeout: 30.0                       # Zenoh connection timeout (seconds)
  media_backend: "no_media"           # only used when wireless=false (USB)
  wake_on_start: true                 # call wake_up() on fresh daemon start
  sleep_on_exit: true                 # call goto_sleep() on exit (blocks ~4s)
  antenna_rest_position: [0.0, 0.0]   # antenna target after wake-up
  daemon_retry_attempts: 3            # connection retries
  daemon_startup_wait: 15.0           # seconds to wait before retry

web:
  ui_fps: 10.0                        # camera FPS for browser UI (independent of VLM ring buffer)
  host: "0.0.0.0"
  port: 8090

ha:
  # Home Assistant integration — when true, spawn the
  # reachy_mini_home_assistant ESPHome voice satellite as a sidecar
  # process. HA auto-discovers via mDNS (no token, no URL needed).
  # Wireless mode only — wired Lite SKU can't share the mic this way.
  # Requires `pip install -e Reachy_Mini_For_Home_Assistant/` (or pip
  # install reachy-mini-home-assistant) into the same venv first.
  enabled: true
  wake_model: "okay_nabu"             # passed through to the satellite
  satellite_log_level: "info"         # debug | info | warning | error
  # Reachy daemon HTTP API (volume control + status). Default points at
  # the robot's mDNS name for remote wireless setups. On-device users
  # should set this to http://127.0.0.1:8000.
  daemon_url: "http://reachy-mini.local:8000"

rag:
  enabled: true
  knowledge_dir: "./knowledge_base"
  persist_dir: "./data/chromadb"
  embedding_backend: "llamacpp"       # "llamacpp" (GPU), "ollama", or "local"
  embedding_model: "bge-small-en-v1.5"
  embedding_base_url: "http://localhost:8081"
  n_results: 1
  min_relevance: 0.5
  chunk_size: 200
  chunk_overlap: 20
